<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>포즈 레퍼런스 이미지 목록</title>
  <link rel="stylesheet" href="../assets/admin.css">
  <style>
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      padding: 14px;
    }
    .g-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }
    .g-thumb {
      height: 150px;
      background: linear-gradient(145deg, #e2ecff, #d8e4fb);
      display: grid;
      place-items: center;
      color: #334155;
      font-size: 13px;
    }
    .g-meta { padding: 10px; }
    .g-title { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
    .g-tags { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">TryAngle Admin</div>
      <div class="nav-title">데이터 관리</div>
      <ul class="nav-list">
        <li><a href="../realtime/realtime-list.html">실시간 로그 데이터 목록</a></li>
      </ul>
      <div class="nav-title">컨텐츠 관리</div>
      <ul class="nav-list">
        <li><a class="active" href="./ref-img-gallery.html">포즈 레퍼런스 이미지 목록</a></li>
      </ul>
    </aside>

    <main class="main">
      <div class="page-head">
        <div>
          <h1>포즈 레퍼런스 이미지 목록</h1>
          <p>갤러리 형태로 레퍼런스 이미지를 탐색하고 상세 화면으로 이동합니다.</p>
        </div>
        <button class="btn primary">이미지 등록</button>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>레퍼런스 갤러리</h2>
          <input class="input" placeholder="title, tag 검색">
        </div>
        <div class="gallery">
          <article class="g-item">
            <div class="g-thumb">image_001</div>
            <div class="g-meta">
              <div class="g-title">하이앵글 컵포즈</div>
              <div class="g-tags">#하이앵글 #OOTD</div>
              <a href="./ref-img-detail.html">상세 보기</a>
            </div>
          </article>
          <article class="g-item">
            <div class="g-thumb">image_002</div>
            <div class="g-meta">
              <div class="g-title">러닝샷 스트릿</div>
              <div class="g-tags">#스트릿 #역동적</div>
              <a href="./ref-img-detail.html">상세 보기</a>
            </div>
          </article>
          <article class="g-item">
            <div class="g-thumb">image_003</div>
            <div class="g-meta">
              <div class="g-title">정면 전신샷</div>
              <div class="g-tags">#전신 #룩북</div>
              <a href="./ref-img-detail.html">상세 보기</a>
            </div>
          </article>
        </div>
      </div>
    </main>
  </div>
</body>
</html>

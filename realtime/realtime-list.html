<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>실시간 로그 데이터 목록</title>
  <link rel="stylesheet" href="../assets/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand" style="display:flex;align-items:center;gap:8px;">
        <span class="icon">triangle_circle</span>
        TryAngle Admin
      </div>
      <div class="nav-title">메인</div>
      <ul class="nav-list">
        <li><a href="../index.html"><span class="icon sm" style="margin-right:8px;">grid_view</span>대시보드</a></li>
      </ul>
      <div class="nav-title">데이터 관리</div>
      <ul class="nav-list">
        <li><a class="active" href="./realtime-list.html"><span class="icon sm" style="margin-right:8px;">analytics</span>실시간 로그 데이터 목록</a></li>
      </ul>
      <div class="nav-title">컨텐츠 관리</div>
      <ul class="nav-list">
        <li><a href="../content/ref-img-gallery.html"><span class="icon sm" style="margin-right:8px;">image</span>레퍼런스 이미지 관리</a></li>
        <li><a href="../content/prod-list.html"><span class="icon sm" style="margin-right:8px;">shopping_bag</span>상품 관리</a></li>
        <li><a href="../content/snap-list.html"><span class="icon sm" style="margin-right:8px;">photo_library</span>후기 사진 관리</a></li>
      </ul>
    </aside>

    <main class="main">
      <div class="page-head">
        <div>
          <h1>실시간 로그 데이터 목록</h1>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <div class="label">오늘 수집 건수</div>
          <div class="value" id="sumTodayCollected">-</div>
        </div>
        <div class="card">
          <div class="label">실시간 처리율</div>
          <div class="value" id="sumRealtimeProcessRate">-</div>
        </div>
        <div class="card">
          <div class="label">오류 의심 건수</div>
          <div class="value" id="sumSuspectedErrors">-</div>
        </div>
        <div class="card">
          <div class="label">평균 Confidence</div>
          <div class="value" id="sumAverageConfidence">-</div>
        </div>
      </div>

      <div class="toolbar" style="margin-bottom:16px;">
        <div class="toolbar-group" style="flex:1;">
          <input id="realtimeSearchInput" class="input" type="text" placeholder="유저 ID 또는 파일명 검색" style="min-width:280px;">
          <select id="realtimeStatusFilter" class="input" aria-label="상태 필터">
            <option>전체 상태</option>
            <option>촬영중</option>
            <option>완료</option>
          </select>
        </div>
        <div class="toolbar-group">
          <button id="realtimeResetBtn" class="btn" type="button">초기화</button>
          <button id="realtimeSearchBtn" class="btn" type="button">검색</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>목록</h2>
        </div>

        <table>
          <thead>
            <tr>
              <th>데이터 ID</th>
              <th>유저 ID</th>
              <th>디바이스</th>
              <th>이미지 레퍼런스</th>
              <th>Confidence</th>
              <th>생성 시간</th>
              <th>상태</th>
              <th>열람</th>
              <th>데이터 내보내기</th>
            </tr>
          </thead>
          <tbody id="realtimeTbody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="../assets/data/system.json.js"></script>
  <script>
    (function () {
      const SYSTEM_JSON_PATH = '../assets/data/system.json';
      const searchInput = document.getElementById('realtimeSearchInput');
      const statusFilter = document.getElementById('realtimeStatusFilter');
      const resetBtn = document.getElementById('realtimeResetBtn');
      const searchBtn = document.getElementById('realtimeSearchBtn');
      const tbody = document.getElementById('realtimeTbody');

      function esc(v) {
        return String(v ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function detailHref(logPath) {
        const p = String(logPath || '').trim();
        return p ? `./realtime-detail.html?log=${encodeURIComponent(p)}` : './realtime-detail.html';
      }

      function statusBadge(status) {
        const s = String(status || '').trim();
        if (s === '촬영중') return '<span class="badge info">촬영중</span>';
        if (s === '완료') return '<span class="badge success">완료</span>';
        return `<span class="badge">${esc(s || '-')}</span>`;
      }

      function renderSummary(summary) {
        const s = summary || {};
        const todayCollected = document.getElementById('sumTodayCollected');
        const realtimeProcessRate = document.getElementById('sumRealtimeProcessRate');
        const suspectedErrors = document.getElementById('sumSuspectedErrors');
        const averageConfidence = document.getElementById('sumAverageConfidence');
        if (todayCollected) todayCollected.textContent = String(s.todayCollected ?? '-');
        if (realtimeProcessRate) realtimeProcessRate.textContent = String(s.realtimeProcessRate ?? '-');
        if (suspectedErrors) suspectedErrors.textContent = String(s.suspectedErrors ?? '-');
        if (averageConfidence) averageConfidence.textContent = String(s.averageConfidence ?? '-');
      }

      function renderLogs(logs) {
        if (!tbody) return;
        const rows = Array.isArray(logs) ? logs : [];
        if (!rows.length) {
          tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:var(--muted);">표시할 실시간 로그가 없습니다.</td></tr>';
          return;
        }

        tbody.innerHTML = rows.map((row) => {
          const href = detailHref(row?.logPath);
          const status = String(row?.status || '').trim();
          return `
            <tr data-status="${esc(status)}">
              <td><a href="${href}">${esc(row?.dataId || '-')}</a></td>
              <td>${esc(row?.userId || '-')}</td>
              <td>${esc(row?.device || '-')}</td>
              <td>${esc(row?.imageReference || '-')}</td>
              <td>${esc(row?.confidence ?? '-')}</td>
              <td>${esc(row?.createdAt || '-')}</td>
              <td>${statusBadge(status)}</td>
              <td><a class="btn" href="${href}">상세보기</a></td>
              <td><button class="btn" type="button">내보내기</button></td>
            </tr>
          `;
        }).join('');
      }

      async function loadSystemData() {
        const fallback = window.__SYSTEM_DATA__;

        if (window.location.protocol === 'file:') {
          renderSummary(fallback?.summary || {});
          renderLogs(fallback?.realtimeLogs || []);
          return;
        }

        try {
          const res = await fetch(SYSTEM_JSON_PATH, { cache: 'no-store' });
          if (!res.ok) throw new Error(`Failed to load system.json: ${res.status}`);
          const json = await res.json();
          renderSummary(json?.summary || {});
          renderLogs(json?.realtimeLogs || []);
        } catch (err) {
          console.warn('system.json 로드 실패', err);
          renderSummary(fallback?.summary || {});
          renderLogs(fallback?.realtimeLogs || []);
        }
      }

      function filterRows() {
        const q = (searchInput?.value || '').trim().toLowerCase();
        const status = (statusFilter?.value || '전체 상태').trim();
        if (!tbody) return;
        Array.from(tbody.querySelectorAll('tr')).forEach((row) => {
          const text = row.textContent.toLowerCase();
          const rowStatus = row.getAttribute('data-status') || '';
          const matchesQuery = !q || text.includes(q);
          const matchesStatus = status === '전체 상태' || rowStatus === status;
          row.style.display = matchesQuery && matchesStatus ? '' : 'none';
        });
      }

      loadSystemData();

      if (searchInput) {
        searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') filterRows(); });
      }
      if (statusFilter) statusFilter.addEventListener('change', filterRows);
      if (searchBtn) searchBtn.addEventListener('click', filterRows);
      if (resetBtn) {
        resetBtn.addEventListener('click', () => {
          if (searchInput) searchInput.value = '';
          if (statusFilter) statusFilter.value = '전체 상태';
          filterRows();
        });
      }
    })();
  </script>

</body>
</html>
